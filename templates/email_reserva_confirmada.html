<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gracias por visitarnos - UMAI!</title>
</head>
<body style="margin:0; padding:0; background-color:#1D1A18; font-family:'Segoe UI', sans-serif;">

    <div style="max-width:600px; margin:40px auto; background-color:#36322F; border-radius:12px; overflow:hidden;">

        <!-- Header -->
        <div style="background-color:#FF7A41; padding:30px; text-align:center;">
            <h1 style="margin:0; color:#FFF5EA; font-size:28px;">UMAi! うまい</h1>
            <p style="margin:5px 0 0; color:#FFF5EA; font-size:13px;">Gracias por visitarnos 🍣</p>
        </div>

        <!-- Contenido -->
        <div style="padding:30px; text-align:center;">
            <p style="color:#FFF5EA; font-size:16px;">Hola, <strong>{{ nombre }}</strong> 👋</p>
            <p style="color:#FFF5EA; font-size:14px; line-height:1.6;">
                Fue un placer tenerte en UMAI! Esperamos que hayas disfrutado la experiencia.<br>
                Si querés, contanos cómo te fue dejando una reseña:
            </p>

            <!-- Estrellas decorativas -->
            <p style="font-size:30px; margin:20px 0;">⭐⭐⭐⭐⭐</p>

            <!-- Botón dejar reseña -->
            <a href="{{ resena_url }}" style="display:inline-block; background-color:#FF7A41; color:#FFF5EA; padding:14px 35px; border-radius:8px; text-decoration:none; font-size:15px; font-weight:bold; margin:10px 0 30px;">
                Dejar una reseña
            </a>

        </div>

        <!-- Footer -->
        <div style="border-top:1px solid #5B534E; padding:20px; text-align:center;">
            <p style="color:#5B534E; font-size:12px; margin:0;">UMAI! · Av. Corrientes 1234, CABA</p>
            <p style="color:#5B534E; font-size:12px; margin:5px 0 0;">reservas@umai.com.ar · +54 11 4567-8900</p>
        </div>

    </div>

</body>
</html>
