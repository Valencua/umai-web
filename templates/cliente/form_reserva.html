<div class="contenedor-form max-w-md border border-white shadow-xl font-sans text-white">
    
    <h2 class="titulo-reserva font-bold mb-6 tracking-wide">
        Nueva reserva
    </h2>
    
    <form id="formulario-reserva" action="#" method="POST">
        
        <div class="mb-5">
            <label class="label-form block text-xs font-bold tracking-widest mb-2">NOMBRE COMPLETO</label>
            <input type="text" name="nombre" placeholder="Ej: Franco Colapinto" 
                   class="input-form w-full border border-transparent focus:outline-none focus:border-orange-500 text-gray-200">
        </div>

        <div class="mb-5">
            <label class="label-form block text-xs font-bold tracking-widest mb-2">EMAIL</label>
            <input type="email" name="email" placeholder="Ej: francpinto@gmail.com" 
                   class="input-form w-full border border-transparent focus:outline-none focus:border-orange-500 text-gray-200">
        </div>

        <div class="flex -mx-2 mb-5">
            <div class="w-1/2 px-2">
                <label class="label-form block text-xs font-bold tracking-widest mb-2">FECHA</label>
                <input type="date" id="fecha-reserva" name="fecha" 
           class="input-form w-full border border-transparent focus:outline-none focus:border-orange-500 text-gray-200">
</div>
            <div class="w-1/2 px-2">
                <label class="label-form  block text-xs font-bold tracking-widest mb-2">TELÉFONO</label>
                <input type="tel" name="telefono" placeholder="Ej: +54 9 11 1234 5678" 
                       class="input-form w-full border border-transparent focus:outline-none focus:border-orange-500 text-gray-200">
            </div>
        </div>

        <div class="flex -mx-2 mb-5">
            <div class="w-1/2 px-2">
                <label class="label-form  block text-xs font-bold tracking-widest mb-2">FECHA</label>
                <select name="horario" 
                        class="input-form w-full border border-transparent focus:outline-none focus:border-orange-500 text-gray-200"> <option value="" disabled selected>Seleccionar</option>
                    <option value="19:00">19:00</option>
                    <option value="19:30">19:30</option>
                    <option value="20:00">20:00</option>
                    <option value="20:30">20:30</option>
                    <option value="21:00">21:00</option>
                    <option value="21:30">21:30</option>
                    <option value="22:00">22:00</option>
                </select>
            </div>
            <div class="w-1/2 px-2">
                <label class="label-form block text-xs font-bold tracking-widest mb-2">PERSONAS</label>
                <input type="number" name="personas" placeholder="2" min="1"
                       class="input-form w-full border border-transparent focus:outline-none focus:border-orange-500 text-gray-200">
            </div>
        </div>

        <div id="mensaje-error" class="hidden text-red-700 px-4 py-2 rounded mb-4 text-sm font-bold text-center">
            Llene todos los campos
        </div>

        <div class="pt-4">
            <button type="submit" 
                    class="button-reserva w-full text-white font-bold text-base tracking-wider uppercase hover:bg-orange-600 focus:outline-none shadow-lg py-2">
                Confirmar reserva - Recibir QR
            </button>
        </div>

    </form>
</div>

<script src="{{ url_for('static', filename='js/cliente/form.js') }}"></script>
