{% extends "base_empleado.html" %}

{% block title %}UMAi! Reseñas{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/reseñas.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
{% endblock %}

{% block content %}
<div class="pestaña-reseñas">
    <!-- Inyectar URL del API para que el JS la lea -->
    <div id="reseñas-config" data-api-base="{{ api_base }}" hidden></div>

    <div class= "fila-superior">
        <div class="tarjeta-base tarjeta-reseñas-pendientes tarjeta-con-lista">
            <div class="header-tarjeta">
                <h2>⏳ Pendientes de aprobación</h2>
            </div>

            <div class="lista-reseñas lista-con-scroll" id="pendientes-list">
            </div>
        </div>         

        <div class="tarjeta-base tarjeta-estadisticas">
            <div class="promedio-estrellas">
                <div class="estrellas-promedio"></div>
                <div class="estrellas-graficas">
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-regular fa-star"></i>
                </div>
            </div>

            <div class="detalles-estadisticas">
                <div class="fila-estadistica">
                    <span class="etiqueta-estadistica">pendientes</span>
                    <span class="valor-estadistica valor-pendientes"></span>
                </div>

                <div class="fila-estadistica">
                    <span class="etiqueta-estadistica">aprobadas</span>
                    <span class="valor-estadistica valor-publicadas"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="fila-inferior">
        <div class="tarjeta-base tarjeta-publicadas tarjeta-con-lista">
            <div class="header-tarjeta">
                <h2 class="titulo-publicadas">✅ Publicadas</h2>
            </div>

            <div class="lista-reseñas lista-con-scroll">
            </div>
        </div>
    </div>

</div>

{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/admin/reseñas.js') }}"></script>
{% endblock %}
